# STPM 開発用 server.properties
# このファイルは :stpm-paper:runServer の前に run/server.properties へコピーされます。
# 共有したい設定は run/server.properties ではなく、このファイルを編集してください。

# 他サーバーへの転送を許可するか。通常のローカル開発では不要です。
accepts-transfers=false

# true にすると、サーバー側の飛行チェックで kick されにくくなります。creative 検証向けです。
allow-flight=true

# Nether を有効にするか。marker の world 対応確認のため有効にしています。
allow-nether=true

# console の broadcast メッセージを OP に送るか。
broadcast-console-to-ops=true

# RCON の broadcast メッセージを OP に送るか。RCON は無効ですが標準値として残しています。
broadcast-rcon-to-ops=true

# crash report などに表示する bug report URL。開発用なので未設定です。
bug-report-link=

# Minecraft サーバー本体の debug mode。通常は false で十分です。
debug=false

# ワールド難易度。検証しやすいよう easy にしています。
difficulty=easy

# command block を有効にするか。コマンド検証をしやすいよう true にしています。
enable-command-block=true

# JMX 監視を有効にするか。通常の plugin 開発では不要です。
enable-jmx-monitoring=false

# GameSpy4 query protocol を有効にするか。外部 server list 連携用なので不要です。
enable-query=false

# RCON を有効にするか。ローカル開発では不要です。
enable-rcon=false

# サーバー一覧から status ping できるようにするか。
enable-status=true

# Microsoft/Mojang の secure profile を強制するか。online-mode=true では基本 true で問題ありません。
enforce-secure-profile=true

# whitelist に載っている player だけを入れるか。
enforce-whitelist=false

# entity の broadcast 距離倍率。100 が標準です。
entity-broadcast-range-percentage=100

# login 時に gamemode を server 設定へ強制変更するか。
force-gamemode=false

# function / command block などが使える command 権限レベル。開発用なので最大寄りにしています。
function-permission-level=4

# default gamemode。plugin 検証をしやすいよう creative にしています。
gamemode=creative

# 村や構造物を生成するか。
generate-structures=true

# world generator の追加設定。通常は空の JSON で問題ありません。
generator-settings={}

# hardcore mode を有効にするか。
hardcore=false

# サーバー一覧で online player を隠すか。
hide-online-players=false

# 初期状態で無効にする data pack。
initial-disabled-packs=

# 初期状態で有効にする data pack。
initial-enabled-packs=vanilla

# Overworld の folder 名。run/world に生成されます。
level-name=world

# world seed。空の場合はランダム生成です。
level-seed=

# world type。通常ワールドなので minecraft:normal です。
level-type=minecraft\:normal

# player の IP を log に出すか。ローカル開発ではどちらでも問題ありません。
log-ips=true

# 連鎖する block update の最大数。標準値です。
max-chained-neighbor-updates=1000000

# 同時接続 player 数の上限。
max-players=20

# 1 tick がこの時間を超えると watchdog が停止判定します。単位は ms です。
max-tick-time=60000

# world border の最大サイズ。
max-world-size=29999984

# サーバー一覧に表示される説明文。
motd=*

# packet compression を始める byte 数。標準値です。
network-compression-threshold=256

# 正規 Minecraft account 認証を使うか。
online-mode=true

# OP の権限レベル。4 は全 command を使える最大レベルです。
op-permission-level=4

# player がいないときに server を pause するまでの秒数。-1 で pause しません。
pause-when-empty-seconds=-1

# idle player を kick するまでの分数。0 で無効です。
player-idle-timeout=0

# proxy 経由接続を拒否するか。ローカル開発では不要です。
prevent-proxy-connections=false

# player 同士のダメージを有効にするか。
pvp=true

# query protocol 用 port。enable-query=false なので通常は使われません。
query.port=25565

# 短時間に大量 packet を送る client を制限する値。0 で無効です。
rate-limit=0

# RCON password。enable-rcon=false なので未設定です。
rcon.password=

# RCON port。enable-rcon=false なので通常は使われません。
rcon.port=25575

# region file の圧縮方式。
region-file-compression=deflate

# resource pack を必須にするか。
require-resource-pack=false

# 配布する resource pack の URL。
resource-pack=

# resource pack の UUID。未使用です。
resource-pack-id=

# resource pack 適用時に表示する説明文。
resource-pack-prompt=

# resource pack の SHA-1 hash。未使用です。
resource-pack-sha1=

# bind する IP address。空欄なら全 interface で listen します。
server-ip=

# Minecraft server の port。
server-port=25565

# mob AI や block tick などを処理する距離。
simulation-distance=10

# monster を spawn させるか。開発中に邪魔になりにくいよう false にしています。
spawn-monsters=false

# spawn 周辺を保護する範囲。開発用なので 0 にしています。
spawn-protection=0

# chunk 書き込みを同期的に行うか。安全寄りの標準設定です。
sync-chunk-writes=true

# chat text filtering の設定ファイル。通常は未設定です。
text-filtering-config=

# chat text filtering の version。通常は 0 です。
text-filtering-version=0

# Linux の native transport を使うか。Windows では実質影響しません。
use-native-transport=true

# client に送る chunk 表示距離。
view-distance=10

# whitelist を有効にするか。
white-list=false